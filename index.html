<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="IGBuuLDMUyUA5rGxBmbA1if2fTYdJ7_uG7SZxQH__TQ" />
    <link rel="preconnect" href="https://dbfkdfyworvptxwlvlyn.supabase.co" crossorigin>
    <link rel="dns-prefetch" href="https://dbfkdfyworvptxwlvlyn.supabase.co">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://img.youtube.com">
    <!-- Preload LCP hero image for faster rendering -->
    <link rel="preload" as="image" href="/src/assets/okan-hero.webp" type="image/webp" fetchpriority="high">
    
    <!-- Default title - will be replaced by react-helmet-async per page -->
    <title>Okan Uckun · Geometric & Minimalist Tattoos NYC</title>
    
    <!-- Sitemap reference -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600&display=swap" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"></noscript>
    <!-- Font display swap for better LCP -->
    <style>
      @font-face {
        font-family: 'Schibsted Grotesk';
        font-display: swap;
      }
    </style>
    
    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-00CEHB2R3X"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-00CEHB2R3X');
    </script>

    <!-- Ahrefs Analytics -->
    <script src="https://analytics.ahrefs.com/analytics.js" data-key="KJErfPgNAQgseC1Gm/jzzA" async></script>
    
  
  <!--
    Page-specific meta tags (title, description, og:title, og:url,
    canonical) are injected per-route by SEOHead.tsx via react-helmet-async,
    then captured by Lovable's prerender. Keeping them hardcoded here in
    addition caused "Multiple meta description tags" (Ahrefs flagged 6
    pages) and "Open Graph URL not matching canonical" (3 pages) — the
    static og:url stayed at the homepage on every page, while Helmet's
    canonical updated to the actual path.

    What stays here: the image + global og defaults that are the SAME
    across every page (site_name, og:type=website, og:image,
    twitter:card). Helmet may still override these per-route as needed.
  -->
  <meta property="og:image" content="https://okanuckun.com/og-images/okan-default.jpg">
  <meta property="og:image:width" content="1024">
  <meta property="og:image:height" content="768">
  <meta property="og:image:alt" content="Okan Uckun — Geometric and minimalist tattoo work">
  <meta name="twitter:image" content="https://okanuckun.com/og-images/okan-default.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Okan Uckun">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
